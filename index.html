<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAWA NOODLES — Level 1-8 Spicy Noodle Bar</title>
    <meta name="description" content="High-throughput spicy noodles and digital wallet system.">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================================================
           Brutalist Street-Food Design System — Kawa Noodles
           Pivoting entirely away from generic "AI SaaS" layouts.
           Uses thick borders, solid offset shadows, raw typography, and warm grit.
           ========================================================================= */
        
        :root {
            --bg: #12100e;            /* Deep obsidian with warm clay undertone */
            --surface: #1e1a17;       /* Raw cardboard/charcoal texture color */
            --surface-card: #28221e;  /* Slightly lighter warm brown-charcoal */
            --brand-red: #d93829;     /* Hot chili oil red */
            --brand-red-hover: #b82d20;
            --brand-yellow: #f1a83a;  /* Fried garlic yellow */
            --brand-yellow-hover: #d5912c;
            --text: #f9f6f0;          /* Raw unbleached cotton/white */
            --text-muted: #a6988c;    /* Toasted sesame gray */
            --border: #f9f6f0;        /* High-contrast solid borders */
            --success: #2aa868;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Organic Grain and halftone noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }

        /* ---- Typography ---- */
        .font-display { 
            font-family: 'Space Grotesk', sans-serif; 
            text-transform: uppercase;
        }
        
        /* ---- Navigation ---- */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            background: var(--surface);
            border-bottom: 3px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 40;
        }
        .nav-logo-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text);
        }
        .nav-logo-icon {
            font-size: 1.75rem;
            background: var(--brand-red);
            padding: 0.35rem 0.5rem;
            border-radius: 4px;
            border: 2px solid var(--border);
            box-shadow: 2px 2px 0px var(--border);
            font-weight: bold;
        }
        .nav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.04em;
        }
        .nav-brand span {
            color: var(--brand-red);
        }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        
        /* Brutalist Role Selector */
        .role-selector {
            display: flex;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .role-btn {
            padding: 0.45rem 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .role-btn.active {
            background: var(--border);
            color: var(--bg);
        }

        /* Tactile Wallet Pill */
        .wallet-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.85rem;
            background: var(--surface-card);
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--brand-yellow);
            box-shadow: 2px 2px 0px var(--border);
        }
        .wallet-pill button {
            width: 20px; height: 20px;
            background: var(--brand-yellow);
            color: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wallet-pill button:hover { 
            background: var(--brand-yellow-hover); 
            transform: translate(-1px, -1px);
            box-shadow: 1px 1px 0px var(--border);
        }

        .cart-btn {
            background: var(--brand-red);
            border: 2px solid var(--border);
            padding: 0.45rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 3px 3px 0px var(--border);
        }
        .cart-btn:hover { 
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px var(--border);
        }
        .cart-badge {
            background: var(--border);
            color: var(--bg);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
        }

        /* ---- Hero Section (Zine / Print-inspired) ---- */
        .hero {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4.5rem 2rem 2.5rem;
            text-align: left;
            position: relative;
        }
        .hero-layout {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 3rem;
            gap: 2rem;
        }
        .hero-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--bg);
            background: var(--brand-yellow);
            padding: 0.25rem 0.5rem;
            border: 1.5px solid var(--border);
            margin-bottom: 1.25rem;
            box-shadow: 2px 2px 0px var(--border);
        }
        .hero h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            line-height: 0.95;
            color: var(--text);
            font-weight: 700;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }
        .hero h2 span {
            color: var(--brand-red);
            font-style: italic;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 380px;
            line-height: 1.5;
            padding-bottom: 0.5rem;
        }

        /* ---- Category Tabs ---- */
        .categories {
            display: flex;
            justify-content: flex-start;
            max-width: 1000px;
            margin: 0 auto;
            gap: 0.75rem;
            padding: 1.5rem 2rem 2rem;
            flex-wrap: wrap;
        }
        .cat-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .cat-btn:hover { 
            transform: translate(-1px, -1px);
            box-shadow: 2px 2px 0px var(--border);
        }
        .cat-btn.active {
            background: var(--brand-red);
            color: var(--text);
            box-shadow: 3px 3px 0px var(--border);
        }

        /* ---- Menu Grid (Asymmetrical Layouts) ---- */
        .menu-grid {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 2rem;
        }
        .menu-item {
            background: var(--surface);
            border: 2px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 4px 4px 0px var(--border);
        }
        .menu-item:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--brand-red);
        }
        
        .menu-item.featured {
            border-color: var(--brand-red);
            box-shadow: 4px 4px 0px var(--brand-red);
        }
        .menu-item.featured:hover {
            box-shadow: 6px 6px 0px var(--border);
        }

        .menu-item-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--bg);
            background: var(--brand-yellow);
            padding: 0.2rem 0.4rem;
            border: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Custom graphic vectors instead of emoji */
        .menu-item-visual {
            width: 100%;
            height: 140px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 4px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .menu-item-visual-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.25rem;
            font-weight: bold;
            color: var(--surface-card);
            user-select: none;
            letter-spacing: -0.05em;
        }
        .menu-item-visual-overlay {
            position: absolute;
            inset: 0.5rem;
            border: 1px dashed var(--border-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .menu-item-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
        }
        .menu-item-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        .menu-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px dashed var(--border-dark);
        }
        .menu-item-price {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--brand-yellow);
        }
        .customize-btn {
            padding: 0.5rem 1.25rem;
            background: var(--text);
            color: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .customize-btn:hover { 
            background: var(--brand-red);
            color: var(--text);
        }

        /* ---- Customization Modal ---- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(18, 16, 14, 0.85);
            z-index: 50;
        }
        .modal-center {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 51;
            padding: 1rem;
        }
        .modal-box {
            background: var(--surface);
            border: 3px solid var(--border);
            padding: 2.25rem;
            max-width: 460px;
            width: 100%;
            box-shadow: 8px 8px 0px var(--bg);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1.5rem;
            border-bottom: 2px dashed var(--border-dark);
            padding-bottom: 1rem;
        }
        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }
        .modal-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .modal-section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--brand-yellow);
            margin-bottom: 0.85rem;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .modal-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-dark);
        }

        /* Spice Level Selector (Grid 1-8) */
        .spice-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .spice-opt {
            padding: 0.6rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--text);
            text-align: center;
        }
        .spice-opt:hover { 
            background: var(--brand-red);
            border-color: var(--border);
        }
        .spice-opt.selected {
            background: var(--brand-red);
            border-color: var(--border);
            box-shadow: 2px 2px 0px var(--border);
            transform: translate(-1px, -1px);
        }

        /* Extra Dimsum Add-ons */
        .addon-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .addon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
        }
        .addon-item:hover {
            border-color: var(--brand-yellow);
        }
        .addon-item.selected {
            border-color: var(--brand-yellow);
            background: var(--surface-card);
            box-shadow: 2px 2px 0px var(--brand-yellow);
            transform: translate(-1px, -1px);
        }
        .addon-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .addon-checkbox {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-radius: 2px;
            background: var(--bg);
            cursor: pointer;
            position: relative;
        }
        .addon-checkbox:checked {
            background: var(--brand-yellow);
            border-color: var(--brand-yellow);
        }
        .addon-checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: var(--bg);
            font-size: 0.7rem;
            font-weight: 900;
            top: -2px;
            left: 2px;
        }
        .addon-name {
            font-size: 0.9rem;
            font-weight: 700;
        }
        .addon-price {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--brand-yellow);
        }

        .modal-footer-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.25rem;
            border-top: 2px dashed var(--border-dark);
        }
        .modal-total-price {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand-yellow);
        }
        .add-cart-confirm {
            padding: 0.75rem 1.5rem;
            background: var(--brand-red);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 2px 2px 0px var(--border);
        }
        .add-cart-confirm:hover { 
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px var(--border);
        }

        /* ---- Cart Drawer ---- */
        .cart-drawer {
            position: fixed;
            top: 0; right: 0;
            width: 100%;
            max-width: 440px;
            height: 100%;
            background: var(--surface);
            border-left: 3px solid var(--border);
            z-index: 51;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .cart-drawer.open {
            transform: translateX(0);
        }

        .cart-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .cart-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 0.5rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1.25rem 0;
            border-bottom: 2px dashed var(--border-dark);
        }
        .cart-item:last-child { border-bottom: none; }
        
        .cart-item-details h4 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
        .cart-item-modifiers {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            margin-bottom: 0.5rem;
        }
        .cart-item-modifiers span {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .cart-item-price {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--brand-yellow);
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .qty-controls {
            display: flex;
            align-items: center;
            border: 2px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            background: var(--bg);
        }
        .qty-btn {
            width: 28px; height: 28px;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
        }
        .qty-btn:hover { background: var(--border-dark); }
        .qty-num {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0 0.5rem;
        }
        .cart-remove-btn {
            background: none;
            border: none;
            color: var(--brand-red);
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .cart-remove-btn:hover { color: var(--text); }

        .cart-footer {
            padding: 1.5rem;
            background: var(--bg);
            border-top: 3px solid var(--border);
        }
        .cart-footer-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .cart-footer-row.total {
            color: var(--text);
            font-weight: 700;
            font-size: 1.25rem;
            border-top: 2px dashed var(--border-dark);
            padding-top: 0.75rem;
            margin-top: 0.75rem;
        }
        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--brand-red);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 3px 3px 0px var(--border);
        }
        .checkout-btn:hover { 
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px var(--border);
        }
        .checkout-btn:disabled {
            background: var(--surface);
            color: var(--text-muted);
            border-color: var(--border-dark);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ---- KDS Screen (Kitchen Display System) ---- */
        .kds-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        .kds-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 1.25rem;
        }
        .kds-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .kds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.5rem;
        }
        .kds-ticket {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            box-shadow: 3px 3px 0px var(--border);
        }
        .kds-ticket.preparing {
            border-color: var(--brand-red);
            box-shadow: 3px 3px 0px var(--brand-red);
        }
        .ticket-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 0.5rem;
        }
        .ticket-id {
            color: var(--text);
        }
        .ticket-items {
            flex: 1;
            margin-bottom: 1.25rem;
        }
        .ticket-item {
            padding: 0.6rem 0;
            border-bottom: 1px dashed var(--border-dark);
            font-size: 0.85rem;
        }
        .ticket-item:last-child { border-bottom: none; }
        .ticket-item-header {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            text-transform: uppercase;
        }
        .ticket-item-modifiers {
            font-size: 0.75rem;
            color: var(--brand-red);
            margin-top: 0.25rem;
            font-weight: 700;
        }
        .ticket-footer {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }
        .kds-action-btn {
            flex: 1;
            padding: 0.5rem;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .kds-action-btn.prepare {
            background: var(--brand-red);
            color: var(--text);
        }
        .kds-action-btn.complete {
            background: var(--success);
            color: var(--text);
        }

        /* ---- Toast Alert ---- */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 1rem 1.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            z-index: 60;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            box-shadow: 4px 4px 0px var(--bg);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ---- Transactions Ledger Page ---- */
        .ledger-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        .ledger-header {
            border-bottom: 2px dashed var(--border);
            padding-bottom: 1.25rem;
            margin-bottom: 2rem;
        }
        .ledger-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 2px solid var(--border);
        }
        .ledger-th {
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            padding: 1rem;
            text-align: left;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--brand-yellow);
        }
        .ledger-td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-dark);
            font-size: 0.85rem;
        }
        .ledger-tr:last-child .ledger-td {
            border-bottom: none;
        }
        .amount-badge {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
        }
        .amount-badge.positive {
            color: var(--success);
        }
        .amount-badge.negative {
            color: var(--brand-red);
        }

        @media (max-width: 640px) {
            .nav { padding: 1rem; }
            .nav-controls { gap: 0.75rem; }
            .kds-header { flex-direction: column; gap: 1rem; align-items: start; }
            .menu-grid { padding: 0 1rem 3rem; }
            .hero-layout { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
            .hero h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/htm/preact/standalone.umd.js"></script>
    <script src="./app.js"></script>
</body>
</html>
