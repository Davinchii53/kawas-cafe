<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawa Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#ffe4e6', // rose-100
                            DEFAULT: '#f43f5e', // rose-500
                            dark: '#be123c', // rose-700
                        },
                        accent: {
                            DEFAULT: '#f59e0b', // amber-500
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        /* Smooth scrolling and transitions */
        * { transition: background-color 0.2s, transform 0.1s; }
    </style>
    
    <!-- Using the Standalone UMD build of HTM + Preact to prevent CORS issues when opening from file:// -->
    <script src="https://unpkg.com/htm/preact/standalone.umd.js"></script>
</head>
<body class="bg-amber-50 text-slate-800 min-h-screen flex flex-col">
    <div id="app" class="flex-grow flex flex-col"></div>
    
    <!-- Standard script tag (not module) so it works instantly when double-clicking the file -->
    <script src="./app.js"></script>
</body>
</html>
